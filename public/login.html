<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Dashboard</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e293b, #3b82f6);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      h2 {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
        border: 1px solid #cbd5e1;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        font-size: 14px;
      }

      .login-btn {
        background: #22c55e;
        color: white;
      }

      .guest-btn {
        background: #64748b;
        color: white;
      }

      button:hover {
        opacity: 0.9;
      }

      .error-msg {
        color: #ef4444;
        font-size: 13px;
        margin-top: 8px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Login Dashboard</h2>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <button class="login-btn" onclick="login()">Login</button>
      <button class="guest-btn" onclick="guest()">Masuk sebagai Guest</button>

      <p class="error-msg" id="errorMsg"></p>
    </div>

    <script>
      const API_BASE = "http://localhost:1140";

      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMsg");
        errorMsg.style.display = "none";

        if (!email || !password) {
          errorMsg.textContent = "Email dan password wajib diisi";
          errorMsg.style.display = "block";
          return;
        }

        try {
          const resLogin = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          const dataLogin = await resLogin.json();

          if (!resLogin.ok) {
            errorMsg.textContent = dataLogin.message || "Login gagal";
            errorMsg.style.display = "block";
            return;
          }

          // simpan token & role
          localStorage.setItem("token", dataLogin.token);
          localStorage.setItem("role", dataLogin.role || "user");

          // arahkan ke dashboard
          window.location.href = "dashboard.html";

        } catch (err) {
          console.error(err);
          errorMsg.textContent = "Tidak bisa terhubung ke server";
          errorMsg.style.display = "block";
        }
      }

      // MODE GUEST (tanpa login)
      async function guest() {
        try {
          // ✅ FETCH TANPA HEADER
          const res = await fetch("http://localhost:1140/dashboard");

          const html = await res.text();

          document.open();
          document.write(html);
          document.close();
        } catch (err) {
          console.error(err);
          alert("Error masuk guest");
        }
        localStorage.removeItem("token");
        localStorage.removeItem("role");
      }
    </script>
  </body>
</html>
