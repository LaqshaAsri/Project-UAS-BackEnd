<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Perpustakaan</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>

  <body>
    <header>
      <h1>Dashboard Perpustakaan</h1>
      <div class="user-info">
        <span id="userLabel">Memuat...</span>
        <span id="roleBadge" class="role-badge"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <nav class="navbar">
      <a href="/admin/books">Book</a>
      <a href="/admin/author">Author</a>
      <a href="/admin/category">Kategori</a>
      <a href="/admin/borrow">Peminjaman</a>
      <a href="/admin/users">User</a>
    </nav>

    <main>
      <div class="card">
        <div class="card-header">
          <h2>Daftar Kategori</h2>
          <button class="add-btn" id="addBtn" onclick="openModal()">+ Tambah Kategori</button>
        </div>
        <table id="categoryTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nama Kategori</th>
              <th>Dibuat Pada</th>
              <th>Dibuat Oleh</th>
              <th>Diperbarui Pada</th>
              <th>Diperbarui Oleh</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="categoryBody">
            <tr>
              <td colspan="5" class="empty">Memuat data...</td>
            </tr>
          </tbody>
        </table>
        <p class="error-msg" id="errorMsg" style="display: none"></p>
      </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3 id="modalTitle">Tambah Kategori</h3>
        <input type="hidden" id="categoryId" />

        <label>Nama Kategori</label>
        <input type="text" id="category_name" placeholder="Fantasy" />

        <div class="modal-actions">
          <button class="cancel-btn" onclick="closeModal()">Batal</button>
          <button class="save-btn" onclick="saveCategory()">Simpan</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:1140";

      function setupUserInfo() {
        const role = localStorage.getItem("role");

        document.getElementById("userLabel").textContent = "Login sebagai: " + (role || "admin");
        document.getElementById("roleBadge").textContent = "ADMIN";
        document.getElementById("roleBadge").className = "role-badge role-admin";
      }

      function authHeaders() {
        const token = localStorage.getItem("token");
        return token ? { "Content-Type": "application/json", Authorization: "Bearer " + token } : { "Content-Type": "application/json" };
      }

      async function loadCategories() {
        const tbody = document.getElementById("categoryBody");
        const errorMsg = document.getElementById("errorMsg");

        errorMsg.style.display = "none";

        try {
          const res = await fetch(API_BASE + "/category", {
            headers: authHeaders(),
          });

          if (!res.ok) {
            throw new Error("Gagal memuat data kategori (status " + res.status + ")");
          }

          const data = await res.json();

          const categories = Array.isArray(data) ? data : data.data || [];

          const colspan = 7;

          if (categories.length === 0) {
            tbody.innerHTML = `
              <tr>
                <td colspan="${colspan}" class="empty">
                  Belum ada data kategori
                </td>
              </tr>
            `;
            return;
          }

          tbody.innerHTML = "";

          categories.forEach((category) => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
              <td>${category.category_id ?? "-"}</td>
              <td>${category.category_name ?? "-"}</td>
              <td>${category.created_at ? new Date(category.created_at).toLocaleDateString("id-ID") : "-"}</td>
              <td>${category.created_by ?? "-"}</td>
              <td>${category.updated_at ? new Date(category.updated_at).toLocaleDateString("id-ID") : "-"}</td>
              <td>${category.updated_by ?? "-"}</td>
              <td>
                <button
                  class="action-btn edit-btn"
                  onclick='editCategory(${JSON.stringify(category)})'>
                  Edit
                </button>

                <button
                  class="action-btn delete-btn"
                  onclick="deleteCategory(${category.category_id})">
                  Hapus
                </button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        } catch (err) {
          console.error(err);
          tbody.innerHTML = "";
          errorMsg.textContent = err.message || "Terjadi kesalahan saat memuat data";
          errorMsg.style.display = "block";
        }
      }
      function openModal() {
        document.getElementById("modalTitle").textContent = "Tambah Kategori";
        document.getElementById("categoryId").value = "";
        document.getElementById("category_name").value = "";
        document.getElementById("modalOverlay").classList.add("active");
      }

      function editCategory(category) {
        document.getElementById("modalTitle").textContent = "Edit Buku";
        document.getElementById("categoryId").value = category.category_id;
        document.getElementById("category_name").value = category.category_name;
        document.getElementById("modalOverlay").classList.add("active");
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("active");
      }

      async function saveCategory() {
        const id = document.getElementById("categoryId").value;

        const payload = {
          category_name: document.getElementById("category_name").value,
        };

        try {
          const url = id ? `${API_BASE}/category/${id}` : `${API_BASE}/category`;

          const method = id ? "PUT" : "POST";

          const res = await fetch(url, {
            method,
            headers: authHeaders(),
            body: JSON.stringify(payload),
          });

          if (!res.ok) {
            throw new Error("Gagal menyimpan data");
          }

          closeModal();
          loadCategories();
        } catch (err) {
          alert(err.message);
        }
      }

      async function deleteCategory(id) {
        if (!confirm("Hapus kategori ini?")) return;

        try {
          const res = await fetch(`${API_BASE}/category/${id}`, {
            method: "DELETE",
            headers: authHeaders(),
          });

          if (!res.ok) {
            throw new Error("Gagal menghapus data");
          }

          loadCategories();
        } catch (err) {
          alert(err.message);
        }
      }
      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "/";
      }

      function setActiveNavbar() {
        const currentPath = window.location.pathname;

        document.querySelectorAll(".navbar a").forEach((link) => {
          if (link.getAttribute("href") === currentPath) {
            link.classList.add("active");
          }
        });
      }

      setActiveNavbar();
      setupUserInfo();
      loadCategories();
    </script>
  </body>
</html>
