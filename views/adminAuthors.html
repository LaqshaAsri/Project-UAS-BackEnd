<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Perpustakaan</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>

  <body>
    <header>
      <h1>Dashboard Perpustakaan</h1>
      <div class="user-info">
        <span id="userLabel">Memuat...</span>
        <span id="roleBadge" class="role-badge"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <nav class="navbar">
      <a href="/admin/books">Book</a>
      <a href="/admin/author">Author</a>
      <a href="/admin/category">Kategori</a>
      <a href="/admin/borrow">Peminjaman</a>
      <a href="/admin/users">User</a>
    </nav>

    <main>
      <div class="card">
        <div class="card-header">
          <h2>Daftar Author</h2>
          <div class="header-actions">
            <input type="number" id="limitInput" class="limit-input" min="1" value="5" />
            <button onclick="changeLimit()">Pagination</button>
            <input type="text" id="searchAuthor" placeholder="Cari author..." />
            <button onclick="searchAuthors()">Cari</button>
            <button class="add-btn" id="addBtn" onclick="openModal()">+ Tambah Author</button>
          </div>
        </div>
        <div class="table-responsive">
          <table id="authorTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Author Name</th>
                <th>Author Country</th>
                <th>Created At</th>
                <th>Created By</th>
                <th>Updated At</th>
                <th>Updated By</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="authorBody">
              <tr>
                <td colspan="5" class="empty">Memuat data...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div id="pagination" class="pagination"></div>
        <p class="error-msg" id="errorMsg" style="display: none"></p>
      </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3 id="modalTitle">Tambah Author</h3>
        <input type="hidden" id="authorId" />

        <label>Nama Author</label>
        <input type="text" id="author_name" placeholder="Nama Author" />

        <label>Negara Author</label>
        <input type="text" id="author_country" placeholder="Indonesia" />

        <div class="modal-actions">
          <button class="cancel-btn" onclick="closeModal()">Batal</button>
          <button class="save-btn" onclick="saveAuthor()">Simpan</button>
        </div>
      </div>
    </div>

    <script src="/js/admin.js"></script>
    <script>
      async function loadAuthors(page = 1, q = "") {
        const tbody = document.getElementById("authorBody");
        const errorMsg = document.getElementById("errorMsg");
        errorMsg.style.display = "none";

        try {
          const res = await fetch(`${API_BASE}/author?q=${encodeURIComponent(q)}&page=${page}&limit=${currentLimit}`, { headers: authHeaders() });

          if (!res.ok) {
            throw new Error("Gagal memuat data author (status " + res.status + ")");
          }

          const data = await res.json();
          const authors = Array.isArray(data) ? data : data.data || [];
          totalData = data.total || 0;
          const colspan = 8;

          if (authors.length === 0) {
            const message = currentSearch ? "Data tidak ditemukan" : "Belum ada data author";

            tbody.innerHTML = `
             <tr>
              <td colspan="${colspan}" class="empty">${message}</td>
             </tr>
            `;

            renderPagination();
            return;
          }

          tbody.innerHTML = "";
          authors.forEach((author) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${author.author_id ?? "-"}</td>
              <td>${author.author_name ?? "-"}</td>
              <td>${author.author_country ?? "-"}</td>
              <td>${author.created_at ? new Date(author.created_at).toLocaleDateString("id-ID") : "-"}</td>
              <td>${author.created_by ?? "-"}</td>
              <td>${author.updated_at ? new Date(author.updated_at).toLocaleDateString("id-ID") : "-"}</td>
              <td>${author.updated_by ?? "-"}</td>
              <td>
                <button
                  class="action-btn edit-btn"
                  onclick='editAuthor(${JSON.stringify(author)})'>
                  Edit
                </button>

                <button
                  class="action-btn delete-btn"
                  onclick="deleteAuthor(${author.author_id})">
                  Hapus
                </button>
              </td>
            `;
            tbody.appendChild(tr);
          });
          renderPagination();
        } catch (err) {
          console.error(err);
          tbody.innerHTML = "";
          errorMsg.textContent = err.message || "Terjadi kesalahan saat memuat data";
          errorMsg.style.display = "block";
        }
      }

      function searchAuthors() {
        currentSearch = document.getElementById("searchAuthor").value;
        currentPage = 1;

        loadAuthors(currentPage, currentSearch);
      }

      function openModal() {
        document.getElementById("modalTitle").textContent = "Tambah Author";
        document.getElementById("authorId").value = "";
        document.getElementById("author_name").value = "";
        document.getElementById("author_country").value = "";
        document.getElementById("modalOverlay").classList.add("active");
      }

      function editAuthor(author) {
        document.getElementById("modalTitle").textContent = "Edit Author";
        document.getElementById("authorId").value = author.author_id;
        document.getElementById("author_name").value = author.author_name;
        document.getElementById("author_country").value = author.author_country;
        document.getElementById("modalOverlay").classList.add("active");
      }

      async function saveAuthor() {
        const id = document.getElementById("authorId").value;
        const payload = {
          author_name: document.getElementById("author_name").value,
          author_country: document.getElementById("author_country").value,
        };

        try {
          const url = id ? `${API_BASE}/author/${id}` : `${API_BASE}/author`;
          const method = id ? "PUT" : "POST";

          const res = await fetch(url, {
            method,
            headers: authHeaders(),
            body: JSON.stringify(payload),
          });

          if (!res.ok) throw new Error("Gagal menyimpan data");

          closeModal();
          loadAuthors();
        } catch (err) {
          alert(err.message);
        }
      }

      async function deleteAuthor(id) {
        if (!confirm("Hapus author ini?")) return;

        try {
          const res = await fetch(`${API_BASE}/author/${id}`, {
            method: "DELETE",
            headers: authHeaders(),
          });

          if (!res.ok) throw new Error("Gagal menghapus data");

          loadAuthors();
        } catch (err) {
          alert(err.message);
        }
      }

      document.getElementById("searchAuthor").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          searchAuthors();
        }
      });

      function changePage(page) {
        currentPage = page;
        if (page < 1 || page > totalPages) {
          return;
        }
        currentPage = page;
        loadAuthors(currentPage, currentSearch);
      }

      setActiveNavbar();
      setupUserInfo();
      loadAuthors(currentPage, currentSearch);
    </script>
  </body>
</html>
