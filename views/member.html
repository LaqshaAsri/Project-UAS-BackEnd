<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Perpustakaan</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>

  <body>
    <header>
      <h1>Dashboard Perpustakaan</h1>
      <div class="user-info">
        <span id="userLabel">Memuat...</span>
        <span id="roleBadge" class="role-badge"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <nav class="navbar">
      <a href="/member/books">Book</a>
    </nav>

    <main>
      <div class="card">
        <div class="card-header">
          <h2>Daftar Buku</h2>
          <div class="header-actions">
            <input type="text" id="searchBook" placeholder="Cari book..." />
            <button onclick="searchBooks()">Cari</button>
          </div>
        </div>
        <table id="bookTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Judul</th>
              <th>Author</th>
              <th>Kategori</th>
              <th>Tahun Publikasi</th>
              <th>Stok</th>
              <th>Dibuat Pada</th>
              <th>Dibuat Oleh</th>
              <th>Diperbarui Pada</th>
              <th>Diperbarui Oleh</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="bookBody">
            <tr>
              <td colspan="5" class="empty">Memuat data...</td>
            </tr>
          </tbody>
        </table>
        <div id="pagination" class="pagination"></div>
        <p class="error-msg" id="errorMsg" style="display: none"></p>
      </div>
    </main>

    <script src="/js/admin.js"></script>
    <script>
      async function loadBooks(page = 1, q = "") {
        const tbody = document.getElementById("bookBody");
        const errorMsg = document.getElementById("errorMsg");
        errorMsg.style.display = "none";

        try {
          const borrowRes = await fetch(`${API_BASE}/borrow`, { headers: authHeaders() });
          let activeBorrowings = [];
          if (borrowRes.ok) {
            const borrowData = await borrowRes.json();
            const allBorrowings = Array.isArray(borrowData) ? borrowData : borrowData.data || [];
            activeBorrowings = allBorrowings.filter((b) => b.STATUS === "dipinjam");
          }

          // 2. Ambil data buku seperti biasa
          const res = await fetch(`${API_BASE}/books?q=${encodeURIComponent(q)}&page=${page}&limit=${currentLimit}`, { headers: authHeaders() });

          if (!res.ok) {
            throw new Error("Gagal memuat data buku (status " + res.status + ")");
          }

          const data = await res.json();
          const books = Array.isArray(data) ? data : data.data || [];
          totalData = data.total || 0;
          const colspan = 11;

          if (books.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${colspan}" class="empty">Belum ada data buku</td></tr>`;
            return;
          }

          tbody.innerHTML = "";
          books.forEach((book) => {
            const isCurrentlyBorrowed = activeBorrowings.some((b) => b.book_id === book.book_id);

            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${book.book_id ?? "-"}</td>
              <td>${book.title ?? "-"}</td>
              <td>${book.author_name ?? "-"}</td>
              <td>${book.category_name ?? "-"}</td>
              <td>${book.published_year ?? "-"}</td>
              <td>${book.stock ?? 0}</td>
              <td>${book.created_at ? new Date(book.created_at).toLocaleDateString("id-ID") : "-"}</td>
              <td>${book.created_by ?? "-"}</td>
              <td>${book.updated_at ? new Date(book.updated_at).toLocaleDateString("id-ID") : "-"}</td>
              <td>${book.updated_by ?? "-"}</td>
              <td>
                <button
                  class="action-btn ${isCurrentlyBorrowed ? "btn-return" : "btn-borrow"}"
                  onclick='toggleBorrowReturn(${JSON.stringify(book)}, ${isCurrentlyBorrowed})'>
                  ${isCurrentlyBorrowed ? "Kembalikan" : "Pinjam"}
                </button>
              </td>
            `;
            tbody.appendChild(tr);
          });
          renderPagination();
        } catch (err) {
          console.error(err);
          tbody.innerHTML = "";
          errorMsg.textContent = err.message || "Terjadi kesalahan saat memuat data";
          errorMsg.style.display = "block";
        }
      }

      async function toggleBorrowReturn(book, isCurrentlyBorrowed) {
        const endpoint = isCurrentlyBorrowed ? "/borrow/returning" : "/borrow/borrowing";
        const konfirmasiTeks = isCurrentlyBorrowed ? `Apakah Anda ingin mengembalikan buku "${book.title}"?` : `Apakah Anda ingin meminjam buku "${book.title}" selama 7 hari ke depan?`;

        if (!confirm(konfirmasiTeks)) return;

        try {
          const res = await fetch(`${API_BASE}${endpoint}`, {
            method: "POST",
            headers: {
              ...authHeaders(),
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ book_id: book.book_id }),
          });

          const result = await res.json();

          if (!res.ok) {
            throw new Error(result.message || `Gagal memproses (Status ${res.status})`);
          }

          alert(result.message);
          loadBooks(currentPage, currentSearch);
        } catch (err) {
          alert(err.message);
          alert("Terjadi kesalahan sistem: " + err.message);
          console.error("Detail Error:", err);
        }
      }

      function searchBooks() {
        currentSearch = document.getElementById("searchBook").value;
        currentPage = 1;
        loadBooks(currentPage, currentSearch);
      }

      document.getElementById("searchBook").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          searchBooks();
        }
      });

      function changePage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        loadBooks(currentPage, currentSearch);
      }

      setActiveNavbar();
      setupUserInfo();
      loadBooks(currentPage, currentSearch);
    </script>
  </body>
</html>
