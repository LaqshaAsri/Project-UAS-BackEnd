<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Register - Perpustakaan</title>
    <link rel="stylesheet" href="/style/login.css" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e293b, #3b82f6);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 320px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      }

      h2 { margin-bottom: 5px; }

      .subtitle {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 9px;
        margin: 6px 0;
        border: 1px solid #cbd5e1;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #3b82f6;
      }

      .btn-register {
        width: 100%;
        padding: 10px;
        margin-top: 12px;
        background: #22c55e;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-register:hover { opacity: 0.9; }

      .btn-back {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        background: #f1f5f9;
        color: #475569;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
      }

      .btn-back:hover { opacity: 0.9; }

      .error-msg {
        color: #ef4444;
        font-size: 13px;
        margin-top: 8px;
        display: none;
      }

      .success-msg {
        color: #22c55e;
        font-size: 13px;
        margin-top: 8px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>📝 Daftar Akun</h2>
      <p class="subtitle">Buat akun baru sebagai Member</p>

      <input type="text" id="user_name" placeholder="Nama Lengkap" />
      <input type="email" id="user_email" placeholder="Email" />
      <input type="password" id="user_password" placeholder="Password" />
      <input type="text" id="user_phone" placeholder="No. HP (opsional)" />
      <input type="text" id="user_address" placeholder="Alamat (opsional)" />

      <p class="error-msg" id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>

      <button class="btn-register" onclick="register()">Daftar</button>
      <button class="btn-back" onclick="window.location.href='/'">← Kembali ke Login</button>
    </div>

    <script>
      const API_BASE = "http://localhost:1140";

      async function register() {
        const user_name = document.getElementById("user_name").value.trim();
        const user_email = document.getElementById("user_email").value.trim();
        const user_password = document.getElementById("user_password").value;
        const user_phone = document.getElementById("user_phone").value.trim();
        const user_address = document.getElementById("user_address").value.trim();

        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        // Validasi di sisi client
        if (!user_name || !user_email || !user_password) {
          errorMsg.textContent = "Nama, email, dan password wajib diisi";
          errorMsg.style.display = "block";
          return;
        }

        if (user_password.length < 6) {
          errorMsg.textContent = "Password minimal 6 karakter";
          errorMsg.style.display = "block";
          return;
        }

        try {
          const res = await fetch(API_BASE + "/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_name,
              user_email,
              user_password,
              user_phone,
              user_address,
              role: "user", // register selalu jadi member
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            errorMsg.textContent = data.message || "Gagal mendaftar";
            errorMsg.style.display = "block";
            return;
          }

          // Berhasil
          successMsg.textContent = "Daftar berhasil! Mengarahkan ke halaman login...";
          successMsg.style.display = "block";

          setTimeout(() => {
            window.location.href = "/";
          }, 2000);

        } catch (err) {
          console.error(err);
          errorMsg.textContent = "Tidak bisa terhubung ke server";
          errorMsg.style.display = "block";
        }
      }
    </script>
  </body>
</html>
