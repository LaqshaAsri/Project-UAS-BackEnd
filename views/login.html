<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Dashboard</title>
    <link rel="stylesheet" href="/style/login.css" />
  </head>

  <body>
    <div class="container">
      <h2>Login Dashboard</h2>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <button class="login-btn" onclick="login()">Login</button>
      <button class="guest-btn" onclick="guest()">Masuk sebagai Guest</button>

      <p class="error-msg" id="errorMsg"></p>
    </div>

    <script>
      const API_BASE = "http://localhost:1140";

      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMsg");
        errorMsg.style.display = "none";

        if (!email || !password) {
          errorMsg.textContent = "Email dan password wajib diisi";
          errorMsg.style.display = "block";
          return;
        }

        try {
          const resLogin = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          const dataLogin = await resLogin.json();

          if (!resLogin.ok) {
            errorMsg.textContent = dataLogin.message || "Login gagal";
            errorMsg.style.display = "block";
            return;
          }

          // simpan token & role
          localStorage.setItem("token", dataLogin.token);
          localStorage.setItem("role", dataLogin.role || "user");

          // arahkan ke dashboard admin
          window.location.href = "/admin/books";
        } catch (err) {
          console.error(err);
          errorMsg.textContent = "Tidak bisa terhubung ke server";
          errorMsg.style.display = "block";
        }
      }

      // MODE GUEST (tanpa login)
      async function guest() {
        try {
          // ✅ FETCH TANPA HEADER
          const res = await fetch("http://localhost:1140/guest/books");

          const html = await res.text();

          localStorage.clear();
          localStorage.setItem("role", "guest");

          location.href = "/guest/books";
        } catch (err) {
          console.error(err);
          alert("Error masuk guest");
        }
        localStorage.removeItem("token");
        localStorage.removeItem("role");
      }
    </script>
  </body>
</html>
