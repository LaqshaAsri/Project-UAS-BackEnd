<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Dashboard</title>
    <link rel="stylesheet" href="/style/login.css" />
  </head>

  <body>
    <div class="container">
      <h2>Perpustakaan</h2>
      <p class="subtitle">Masuk ke akun kamu</p>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <div class="btn-group">
        <button class="btn-admin" onclick="loginAs('admin')">Login Admin</button>
        <button class="btn-member" onclick="loginAs('user')">Login Member</button>
      </div>

      <div class="divider">atau</div>

      <button class="btn-guest" onclick="guest()">Masuk sebagai Guest</button>
      <button class="btn-register" onclick="window.location.href = '/register'">Daftar Akun Baru</button>

      <p class="error-msg" id="errorMsg"></p>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
